<html>
    <head>
        <title>Dashboard</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <style>
            .sidebar{
                height:100vh;
                width:200px;
                color:white;
                position:fixed;
            }
             #arrow{
                 background:linear-gradient(to right,#6F64F1,#9A58F6);
                 color:white;
                width:50px;
                height:40px;
                font-size:15px;
                border-radius:10px;
                padding:10px;
            }
            #dashboard{
                background:#6366F1;
                border-color:#6366F1;
                border-radius:10px;
                padding:10px;
            }
            #record:hover{
                 background:#6366F1;
                border-color:#6366F1;
                border-radius:10px;
                padding:10px;

            }
            #login{
                margin-top:300px;
                margin-left:20px;
            }
            .card{
                border-radius:10px;
                border:none;
            }
        </style>
    </head>
    <body class="bg-light">
        <div class="row">
            <div class="col-md-2">
                <div class="sidebar bg-dark p-4">
                    <h5 class="mt-4"><i class="bi bi-arrow-up-right" id="arrow"></i> sales Pro</h5>
                    <p class="mt-5">Main menu</p>
                   <div>
                    <p class="mt-3" id="dashboard"><i class="bi bi-grid"></i>  Dashboard</p>
                    <p class="mt-3" id="record" onclick="record()"><i class="bi bi-plus-circle"></i>  Record Sales</p>
                   </div>
                   <a href="login.html" class="btn btn-outline-danger" id="login"><i class="bi bi-box-arrow-right"></i> Logout</a>

                </div>
            </div>
            <div class="col-md-10">
                <h3 class="mt-3">Dashboard</h3>
                <div class="row mt-3">
                    <div class="col-md-4">
                        <div class="card p-3 shadow">
                            <p>Total Sales Revenue</p>
                            <p id="total" class="text-primary"><b>₹ 0</b></p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card p-3 shadow">
                            <p>Total Records </p>
                            <p id="totalrecords"><b>₹ 0</b></p>
                        </div>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-md-6">
                        <div class="card p-3">
                            <h5>Monthly Sales Performance</h5>
                            <canvas id="barchart"></canvas>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card p-3">
                            <h5>Sales Distribution</h5>
                            <canvas id="piechart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script>
          
            function record(){
                window.location.href="sales.html";
            }
          async function recordcount() {
             let response = await fetch(`http://localhost:8080/salescount`);
            let recordcount = await response.text();
            document.getElementById("totalrecords").innerHTML = recordcount;
            
          }
          recordcount();
          async function loadchart() {
            let response = await fetch(`http://localhost:8080/detailrecord`);
            let data = await response.json();
           let labels = data.map(item => item.month);
           let amount = data.map(item => item.price);
            new Chart(document.getElementById("barchart"),{
                type:'bar',
                data:{
                    labels:labels,
                    datasets:[{
                        label:'Revenue',
                        data:amount,
                        backgroundColor:["#6366F1","#A755F7","#EB4899"]
                    }]
                }
            });
            new Chart(document.getElementById("piechart"),{
                type:'pie',
                data:{
                    labels:labels,
                    datasets:[{
                        label:'Revenue',
                        data:amount,
                        backgroundColor:["#6366F1","#A755F7","#EB4899"]
                    }]
                }
            });
             
            
            
            
          }
          loadchart();
          async function loadrevenue() {
        let response = await fetch(`http://localhost:8080/detailrecord`);
        let data = await response.json();
        let totalrevenue = 0;
        console.log(data);
        for(let m of data){
            totalrevenue += m.totalamount;

            document.getElementById("total").innerHTML = "₹" + totalrevenue;
        }
            
          }
          loadrevenue();
          
          
        </script>
    </body>
</html>
