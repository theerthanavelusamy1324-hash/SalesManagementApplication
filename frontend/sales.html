<html>
    <head>
        <title>Sales</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
        <style>
            #dash{
                border-color:white;
            }
            #record{
                background:linear-gradient(to right,#6F64F1,#9B58F6);
                color:white;
                border-radius:10px;
            }
            .card{
                border-radius:10px;
                border:none;
            }
            .count{
                background:#F2F6FB;
                color:#7D7F87;
                width:100px;
                border-radius:10px;
                padding:5px;
                margin-left:200px;
            }
          .table thead th{
            background:#F1F4F9;
          }
         
         
        </style>
    </head>
    <body class="bg-light">
        <nav class="navbar bg-dark">
            <span class="ms-5 text-white"><i class="bi bi-arrow-up-right"></i>Sales pro</span>
            <a href="dashboard.html" class="btn me-5 text-white" id="dash"><i class="bi bi-grid"></i> Dashboard</a>
        </nav>
        <div class="container">
            <div class="row mt-4">
                <div class="col-md-4">
                    <div class="card p-4 shadow">
                        <h5 class="text-primary"><i class="bi bi-plus-circle"></i> Add New Sale</h5>
                        <label class="mt-3">Product Name</label>
                        <input type="text" id="productname" placeholder="Enter Product Name" class="form-control mt-2">
                         <label class="mt-3">Month</label>
                         <select id="month" class="form-select mt-2">
                            <option value="" disabled selected>Select Month</option>
                            <option value="January">January</option>
                            <option value="February">February</option>
                            <option value="March">March</option>
                            <option value="April">April</option>
                            <option value="May">May</option>
                            <option value="June">June</option>
                            <option value="July">July</option>
                            <option value="August">August</option>
                            <option value="September">September</option>
                            <option value="October">October</option>
                            <option value="November">November</option>
                            <option value="December">December</option>
                         </select>
                         <div class="row mt-3">
                            <div class="col-md-6">
                                <label class="mt-3">Quantity</label>
                                <input type="number" id="qty" placeholder="Quantity" class="form-control mt-2">
                            </div>
                             <div class="col-md-6">
                                <label class="mt-3">Price(₹)</label>
                                <input type="number" id="price" placeholder="Price" class="form-control mt-2">
                            </div>
                         </div>
                         <button onclick="record()" class="btn mt-4" id="record">Record Transaction</button>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card p-3">
                        <div class="row mt-2">
                            <div class="col-md-6">
                                <h5><i class="bi bi-list"></i> Sales Records</h5>
                            </div>
                            <div class="col-md-6">
                             <p class="count"><span id="totalcount">0</span> Records</p>
                            </div>
                        </div>
                        <table class="table mt-3">
                            <thead id="tablehead">
                                <tr>
                                    <th>Product Details</th>
                                    <th>Month</th>
                                    <th>QTY</th>
                                    <th>Total Revenue</th>
                                </tr>
                            </thead>
                            <tbody id="tablebody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <script>
            async function record() {
                let productname = document.getElementById("productname").value;
                  let month = document.getElementById("month").value;
                    let quantity = document.getElementById("qty").value;
                  let price = document.getElementById("price").value;
            let response = await fetch(`http://localhost:8080/record?productname=${productname}&month=${month}&quantity=${quantity}&price=${price}`);
            let data = await response.text();
            loadsales();
            salescount();
            document.getElementById("productname").value = "";
            document.getElementById("month").value = "";
             document.getElementById("qty").value = "";
              document.getElementById("price").value = "";
                
            }
            async function loadsales() {
            let response = await fetch(`http://localhost:8080/detailrecord`);
            let data = await response.json();
            let row = "";
            console.log(data);
            for(let t of data){
                row +=`
                <tr>
                    <td>${t.productname}</td>
                     <td class="month">${t.month}</td>
                      <td>${t.quantity}</td>
                       <td class="text-success"><b> ₹${t.totalamount}</b></td>
                       </tr>
                       `;
            }
            document.getElementById("tablebody").innerHTML = row;
         
                
            }
            loadsales();
            async function salescount() {
            let response = await fetch(`http://localhost:8080/salescount`);
            let salescount = await response.text();
            document.getElementById("totalcount").innerHTML = salescount;
                
            }
            salescount();
        </script>
    </body>
</html>
