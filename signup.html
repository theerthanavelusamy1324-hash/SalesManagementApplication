<html>
    <head>
        <title>Signup</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
        <style>
            img{
                width:100%;
                height:100vh;
                position: relative;
                object-fit:cover;
                  overflow:hidden;
                
            }
            
            .header{
                position:absolute;
               bottom:200px;
                color:white;
              margin-left:200px;
            }
            .header h3{
                font-size:30px;
                font-weight:bold;
            }
            .header p{
                font-size:20px;
            }
            .btn{
                background:linear-gradient(to right,#6F64F1,#9A58F6);
                color:white;
                border-radius:10px;
            }
            .card{
                margin-top:30px;
                border-radius:10px;
                border:none;
              
            }
            #arrow{
                 background:linear-gradient(to right,#6F64F1,#9A58F6);
                 color:white;
                width:50px;
                height:40px;
                margin-left:170px;
                font-size:15px;
                border-radius:10px;
                padding:10px;
            }
            
        </style>
    </head>
    <body class="bg-light">
        <div class="row">
            <div class="col-md-8">
                <img src=" https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&q=80">
                <div class="header">
                    <h3>Elevate your sales performance.</h3>
                    <p>Access your dashboard and manage leads in real-time.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <i class="bi bi-arrow-up-right text-center mt-4" id="arrow"></i>
                    <h3 class="text-center mt-3">Create Account</h3>
                    <p class="text-center mt-3">Please Enter your details.</p>
                      <lable class="mt-3">Username</lable>
                    <input type="text" id="name" placeholder="Username" class="form-control mt-2">
                    <lable class="mt-3">Email</lable>
                    <input type="email" id="mail" placeholder="Email" class="form-control mt-2">
                    <lable class="mt-3">Password</lable>
                    <input type="password" id="password" placeholder="Password" class="form-control mt-2">
                    <button onclick="register()" class="btn mt-4">Register</button>
                    <p class="mt-4 text-center">Already have account?<span class="text-primary" onclick="back()">Login</span></p>
                    <p class="mt-3 text-danger text-center" id="result"></p>

                </div>
            </div>
        </div>
        <script>
            async function register() {
                 let username = document.getElementById("name").value;
            let email = document.getElementById("mail").value;
               let password = document.getElementById("password").value;
            let response = await fetch(`http://localhost:8080/register?username=${username}&email=${email}&password=${password}`,
                {
                    method:"POST"
                }
            );
            let data = await response.text();
           document.getElementById("result").innerHTML = data;
                
            }
            function back(){
                   window.location.href = "login.html";

            }
        </script>
    </body>
</html>
